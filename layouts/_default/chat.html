<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Chat with Ostap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    {{ $styles := resources.Get "css/styles.css" | fingerprint }}
    {{ $chatPage := resources.Get "css/chat-page-styles.css" | fingerprint }}
    <link rel="stylesheet" href="{{ $styles.RelPermalink }}"/>
    <link rel="stylesheet" href="{{ $chatPage.RelPermalink }}"/>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      })();
    </script>
  </head>
  <body class="chat-body">
    <a class="chat-wordmark" href="/">ostaps.net</a>
    <div class="chat-page" id="chatPage">
      <div class="chat-header">
        <div class="chat-header-titlegroup">
          <span class="chat-header-title">Chat with Ostap</span>
          <span class="chat-beta-badge" tabindex="0" aria-label="Experimental alpha - this AI bot may get things wrong; for anything that matters, reach out via LinkedIn or email">
            <span class="chat-beta-badge-dot" aria-hidden="true"></span>V0.1<span class="chat-beta-badge-sep" aria-hidden="true">·</span>ALPHA
            <span class="chat-beta-tooltip" role="tooltip">
              Experimental personal-site bot. May get things wrong.<br>
              For things that matter: <a href="https://www.linkedin.com/in/ostapsenyuk/" target="_blank" rel="noopener">LinkedIn</a> · <a href="mailto:ostap.senyuk@gmail.com">email</a>
            </span>
          </span>
        </div>
        <div class="chat-header-actions">
          <button class="chat-clear" id="chatClear" aria-label="Clear chat">clear</button>
          <button class="chat-back" id="chatBack" aria-label="Back">back</button>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-status" id="chatStatus"></div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Ask me anything..." autocomplete="off" maxlength="500">
        <button class="chat-send" id="chatSend">Send</button>
      </div>
      <div id="turnstileWidget" style="display:none;"></div>
    </div>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit" async defer></script>
    <script>
    var turnstileToken = null;
    var turnstileWidgetId = null;

    function onTurnstileLoad() {
      turnstileWidgetId = turnstile.render('#turnstileWidget', {
        sitekey: '{{ site.Params.turnstile_sitekey | default "1x00000000000000000000AA" }}',
        callback: function(token) { turnstileToken = token; },
        'expired-callback': function() { turnstileToken = null; },
        'error-callback': function() { turnstileToken = null; },
      });
    }

    (function() {
      'use strict';

      var API_URL = 'https://chat-with-me.ostap-senyuk.workers.dev';
      var MAX_HISTORY = 10;
      var SESSION_KEY = 'ostap_chat_session';
      var HISTORY_KEY = 'ostap_chat_history';

      var clearBtn = document.getElementById('chatClear');
      var backBtn = document.getElementById('chatBack');
      var messages = document.getElementById('chatMessages');
      var input = document.getElementById('chatInput');
      var sendBtn = document.getElementById('chatSend');
      var status = document.getElementById('chatStatus');

      var sessionId = sessionStorage.getItem(SESSION_KEY);
      if (!sessionId) {
        sessionId = crypto.randomUUID();
        sessionStorage.setItem(SESSION_KEY, sessionId);
      }

      var history = [];
      try {
        var saved = sessionStorage.getItem(HISTORY_KEY);
        if (saved) history = JSON.parse(saved);
      } catch (e) {}

      var streaming = false;
      var GREETING = "Hey - I know about Ostap's career, projects, and tech opinions. Pick a question or type your own.";
      var THINKING_VERBS = ['Thinking', 'Reasoning', 'Considering', 'Pondering', 'Reflecting'];
      var thinkingInterval = null;

      function startThinking(el) {
        var idx = 0;
        var span = document.createElement('span');
        span.className = 'chat-thinking';
        span.textContent = THINKING_VERBS[0] + '...';
        el.insertBefore(span, el.firstChild);
        thinkingInterval = setInterval(function() {
          idx = (idx + 1) % THINKING_VERBS.length;
          span.textContent = THINKING_VERBS[idx] + '...';
        }, 2000);
      }

      function stopThinking(el) {
        if (thinkingInterval) { clearInterval(thinkingInterval); thinkingInterval = null; }
        var span = el.querySelector('.chat-thinking');
        if (span) span.parentNode.removeChild(span);
      }
      var SUGGESTED_QUESTIONS_POOL = [
        "What kind of role is he actually looking for?",
        "Is he available, and where is he based?",
        "Why did he take two years off?",
        "He rescued a failing ad tech project - what happened?",
        "What's Satori Ads, and what's his real role there?",
        "How does he work with Claude Code day-to-day?",
        "What's the one Amazon project he's most proud of?",
        "What's an AI-PM workflow that actually works for him?",
        "He reverse-engineered a school API - what's that about?",
        "Photography, music, ad tech - how does it all connect?",
        "What does he think makes a good 0-to-1 PM?",
        "Anything he'd do differently in his career?"
      ];
      var SUGGESTIONS_COUNT = 3;

      function pickSuggestions() {
        var pool = SUGGESTED_QUESTIONS_POOL.slice();
        for (var k = pool.length - 1; k > 0; k--) {
          var j = Math.floor(Math.random() * (k + 1));
          var tmp = pool[k]; pool[k] = pool[j]; pool[j] = tmp;
        }
        return pool.slice(0, SUGGESTIONS_COUNT);
      }

      function saveHistory() {
        try { sessionStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
      }

      function renderMarkdown(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
          .replace(/\n/g, '<br>');
      }

      function addMessage(role, content) {
        var div = document.createElement('div');
        div.className = 'chat-message ' + role;
        div.innerHTML = renderMarkdown(content);
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
      }

      function setStreaming(val) {
        streaming = val;
        sendBtn.disabled = val;
        input.disabled = val;
      }

      function showStatus(text) {
        status.textContent = text;
        status.classList.add('visible');
      }

      function hideStatus() {
        status.classList.remove('visible');
      }

      function showSuggestions() {
        var container = document.createElement('div');
        container.className = 'chat-suggestions';
        container.id = 'chatSuggestions';
        var picks = pickSuggestions();
        for (var i = 0; i < picks.length; i++) {
          var btn = document.createElement('button');
          btn.className = 'chat-chip';
          btn.textContent = picks[i];
          btn.addEventListener('click', (function(q) {
            return function() {
              input.value = q;
              hideSuggestions();
              sendMessage();
              if (window.sa_event) sa_event('chat_chip_tapped');
            };
          })(picks[i]));
          container.appendChild(btn);
        }
        messages.appendChild(container);
        messages.scrollTop = messages.scrollHeight;
      }

      function hideSuggestions() {
        var el = document.getElementById('chatSuggestions');
        if (el) el.parentNode.removeChild(el);
      }

      // Init
      if (history.length > 0) {
        for (var i = 0; i < history.length; i++) {
          addMessage(history[i].role, history[i].content);
        }
      } else {
        addMessage('assistant', GREETING);
        showSuggestions();
      }
      input.focus();
      if (window.sa_event) window.sa_event('chat_opened');

      // Back
      backBtn.addEventListener('click', function() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = '/';
        }
      });

      // Clear
      clearBtn.addEventListener('click', function() {
        if (streaming) return;
        history = [];
        saveHistory();
        messages.innerHTML = '';
        hideStatus();
        sessionId = crypto.randomUUID();
        sessionStorage.setItem(SESSION_KEY, sessionId);
        addMessage('assistant', GREETING);
        showSuggestions();
        input.focus();
        if (window.sa_event) window.sa_event('chat_cleared');
      });

      // Turnstile token helper
      function getTurnstileToken(timeoutMs) {
        if (turnstileToken) return Promise.resolve(turnstileToken);
        if (!window.turnstile) return Promise.resolve('');
        return new Promise(function(resolve) {
          var elapsed = 0;
          var interval = setInterval(function() {
            elapsed += 100;
            if (turnstileToken) { clearInterval(interval); resolve(turnstileToken); }
            else if (elapsed >= timeoutMs) { clearInterval(interval); resolve(''); }
          }, 100);
        });
      }

      // Send
      async function sendMessage() {
        var text = input.value.trim();
        if (!text || streaming) return;

        hideSuggestions();
        hideStatus();
        if (window.sa_event) window.sa_event('chat_message_sent');
        addMessage('user', text);
        history.push({ role: 'user', content: text });
        input.value = '';

        var apiMessages = history.slice(-MAX_HISTORY * 2);

        setStreaming(true);

        var assistantDiv = document.createElement('div');
        assistantDiv.className = 'chat-message assistant';
        var cursor = document.createElement('span');
        cursor.className = 'chat-cursor';
        assistantDiv.appendChild(cursor);
        messages.appendChild(assistantDiv);
        messages.scrollTop = messages.scrollHeight;
        startThinking(assistantDiv);

        var fullResponse = '';
        var firstChunk = true;
        var tokenForRequest = await getTurnstileToken(3000);

        // Reset Turnstile for next request (tokens are single-use)
        turnstileToken = null;
        if (turnstileWidgetId !== null && window.turnstile) {
          turnstile.reset(turnstileWidgetId);
        }

        fetch(API_URL + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, messages: apiMessages, turnstile_token: tokenForRequest })
        }).then(function(response) {
          if (!response.ok) {
            if (response.status === 429) throw new Error('rate_limit');
            if (response.status === 403) throw new Error('forbidden');
            throw new Error('api_error');
          }

          var reader = response.body.getReader();
          var decoder = new TextDecoder();

          function read() {
            return reader.read().then(function(result) {
              if (result.done) {
                if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
                assistantDiv.innerHTML = renderMarkdown(fullResponse);
                history.push({ role: 'assistant', content: fullResponse });
                saveHistory();
                setStreaming(false);
                messages.scrollTop = messages.scrollHeight;
                return;
              }

              var chunk = decoder.decode(result.value, { stream: true });
              var lines = chunk.split('\n');
              for (var j = 0; j < lines.length; j++) {
                var line = lines[j].trim();
                if (!line.startsWith('data: ')) continue;
                var data;
                try { data = JSON.parse(line.slice(6)); } catch (e) { continue; }

                if (data.type === 'chunk' && data.text) {
                  if (firstChunk) { stopThinking(assistantDiv); firstChunk = false; }
                  fullResponse += data.text;
                  assistantDiv.innerHTML = renderMarkdown(fullResponse);
                  assistantDiv.appendChild(cursor);
                  messages.scrollTop = messages.scrollHeight;
                } else if (data.type === 'error') {
                  throw new Error(data.message || 'api_error');
                }
              }
              return read();
            });
          }

          return read();
        }).catch(function(err) {
          stopThinking(assistantDiv);
          if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
          setStreaming(false);
          if (err.message === 'rate_limit') {
            showStatus("Conversation limit reached. Connect with Ostap on LinkedIn instead.");
          } else if (err.message === 'forbidden') {
            showStatus("Verification failed. Please refresh and try again.");
          } else {
            showStatus("Something went wrong. Try again in a moment.");
          }
          if (!fullResponse) messages.removeChild(assistantDiv);
        });
      }

      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      // Keep chat pinned to visible viewport when keyboard opens (mobile only).
      // On desktop the chat is a static centered card; inline top/height writes
      // would override the stylesheet and break that layout, so guard them out.
      var isMobileChat = window.matchMedia('(max-width: 767px)');
      if (window.visualViewport && isMobileChat.matches) {
        var chatPage = document.getElementById('chatPage');
        function syncViewport() {
          chatPage.style.height = window.visualViewport.height + 'px';
          chatPage.style.top = window.visualViewport.offsetTop + 'px';
          messages.scrollTop = messages.scrollHeight;
        }
        window.visualViewport.addEventListener('resize', syncViewport);
        window.visualViewport.addEventListener('scroll', syncViewport);
      }
    })();
    </script>
    <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" /></noscript>
    {{ partial "posthog.html" . }}
  </body>
</html>
